version: 0.2

env:
  variables:
    DATABASE_URL: "sqlite:///:memory:"
    STATIC_TOKEN: "test-static-token"
    JWT_SECRET_KEY: "test-jwt-secret"

phases:

  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - pip install pytest

  pre_build:
    commands:
      - python -m pytest tests/ -v --tb=short

  build:
    commands:
      - zip -r application.zip . -x *.git* -x *__pycache__* -x *.pyc

artifacts:
  files:
    - application.zip
  discard-paths: yes
