version: 0.2

env:
  variables:
    DATABASE_URL: "sqlite:///:memory:"
    STATIC_TOKEN: "test-static-token"
    JWT_SECRET_KEY: "test-jwt-secret"

phases:

  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Instalando dependencias..."
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - pip install pytest

  pre_build:
    commands:
      - echo "Ejecutando pruebas unitarias..."
      - python -m pytest tests/ -v --tb=short
      - echo "Pruebas finalizadas exitosamente"

  build:
    commands:
      - echo "Empaquetando artefacto..."
      - zip -r application.zip . --exclude "*.git*" --exclude "*__pycache__*" --exclude "*.pyc" --exclude ".env"
      - echo "Artefacto generado: application.zip"

artifacts:
  files:
    - application.zip
  discard-paths: yes
