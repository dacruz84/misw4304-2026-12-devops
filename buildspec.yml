version: 0.2

env:
  variables:
    DATABASE_URL: "sqlite:///:memory:"
    STATIC_TOKEN: "test-static-token"
    JWT_SECRET_KEY: "test-jwt-secret"
    AWS_DEFAULT_REGION: "us-east-1"
    AWS_ACCOUNT_ID: "176972295357"
    IMAGE_REPO_NAME: "blacklist-app"
    IMAGE_TAG: "latest"

phases:

  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - pip install pytest

  pre_build:
    commands:
      - echo "Ejecutando pruebas unitarias..."
      - python -m pytest tests/ -v --tb=short
      - echo "Iniciando sesion en Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "Construyendo imagen Docker..."
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG

  post_build:
    commands:
      - echo "Subiendo imagen a ECR..."
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
      - echo "Generando Dockerrun.aws.json..."
      - printf '{"AWSEBDockerrunVersion":"1","Image":{"Name":"%s","Update":"true"},"Ports":[{"ContainerPort":"5000"}]}' $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG > Dockerrun.aws.json

artifacts:
  files:
    - Dockerrun.aws.json
